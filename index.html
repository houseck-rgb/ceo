<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#111111" />
<title>최우영씨푸드 CEO 발주리스트</title>
<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --black:#111111;
  --line:#e5e5ea;
  --line2:#f0f0f5;
  --gold:#b8860b;
  --gold2:#c9952a;
  --gold3:#e8c96e;
  --goldbg:#fdf6e3;
  --goldbr:#e8c86a;
  --txt:#111111;
  --txt2:#555555;
  --txt3:#999999;
  --kakao:#FEE500;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100dvh;
  padding-bottom:132px;
}
.splash{
  background:#111;
  padding:52px 22px 44px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.logo-icon{font-size:58px;margin-bottom:18px}
.gold-title{
  font-size:32px;
  font-weight:900;
  line-height:1.1;
  letter-spacing:.5px;
  background:linear-gradient(180deg,#fff4bf 0%,#e8c96e 46%,#b8860b 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 2px 12px rgba(232,201,110,.25);
}
.gold-sub{
  margin-top:8px;
  font-size:23px;
  font-weight:900;
  letter-spacing:.18em;
  background:linear-gradient(180deg,#fff4bf 0%,#e8c96e 46%,#b8860b 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.divider{
  width:56px;height:1px;background:rgba(232,201,110,.42);
  margin:22px auto 18px;
}
.app-title{
  color:var(--gold3);
  font-size:20px;
  font-weight:900;
  letter-spacing:.2em;
}
.header{
  position:sticky;top:0;z-index:20;
  background:rgba(242,242,247,.96);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.h-title{font-weight:900;font-size:17px;letter-spacing:-.3px}
.h-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.today{
  background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:7px 13px;
  font-size:12px;font-weight:800;color:var(--txt2);
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 0}
.hero{
  background:var(--goldbg);
  border:1px solid var(--goldbr);
  border-radius:20px;
  padding:14px 15px;
  display:flex;gap:11px;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  margin-bottom:12px;
}
.hero-ic{font-size:24px}
.hero-title{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:-.2px}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.badge{
  font-size:11px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:99px;
  padding:4px 9px;
  color:var(--txt2);
}
.badge.gold{border-color:var(--goldbr);background:var(--goldbg);color:var(--gold);font-weight:800}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.045);
  margin-bottom:12px;
}
.card-h{
  padding:15px 16px;
  border-bottom:1px solid var(--line2);
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:15px;
  font-weight:900;
}
.count{
  font-size:11px;color:var(--gold);
  border:1px solid var(--goldbr);
  background:var(--goldbg);
  border-radius:99px;
  padding:4px 10px;
  font-weight:900;
}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.store-btn{
  height:54px;border:1px solid rgba(201,161,74,.35);
  background:#111;color:#fff;border-radius:16px;
  font-size:15px;font-weight:900;
}
.store-btn.selected{
  background:linear-gradient(180deg,#fff1b8,#d7a72c);
  color:#111;
}
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--line2);
}
.row:last-child{border-bottom:none}
.item-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.step{
  width:36px;height:36px;border:1px solid var(--line);
  background:#fff;font-size:20px;font-weight:500;
}
.step.minus{border-radius:11px 0 0 11px}
.step.plus{border-radius:0 11px 11px 0}
.qty{
  width:54px;height:36px;border:1px solid var(--line);
  text-align:center;font-size:15px;font-weight:900;
  outline:none;
}
.unit{font-size:13px;color:var(--gold);font-weight:900;min-width:28px}
.check-list{padding:14px;display:flex;flex-direction:column;gap:10px}
.check-row{
  display:flex;align-items:center;gap:11px;
  background:var(--goldbg);
  border:1px solid var(--goldbr);
  border-radius:16px;
  padding:14px;
  font-size:15px;font-weight:800;
}
.check-row input{width:20px;height:20px}
.memo-area{padding:14px}
.memo{
  width:100%;
  min-height:142px;
  resize:vertical;
  border:1.5px solid var(--line);
  border-radius:16px;
  background:#fafafa;
  padding:14px;
  font-size:15px;
  line-height:1.55;
  outline:none;
  font-family:inherit;
}
.memo:focus{border-color:var(--goldbr);background:#fff}
.preview{
  white-space:pre-wrap;
  background:#111;
  color:#fff;
  border-radius:16px;
  padding:14px;
  font-size:14px;
  line-height:1.65;
  max-height:260px;
  overflow:auto;
}
.bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:rgba(242,242,247,.97);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding:12px 14px 26px;
}
.bottom-inner{max-width:720px;margin:0 auto;display:flex;gap:10px}
.send{
  flex:1;height:56px;border:none;border-radius:18px;
  background:#111;color:#fff;font-size:17px;font-weight:900;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
}
.copy{
  flex:1;height:56px;border:none;border-radius:18px;
  background:var(--kakao);color:#111;font-size:17px;font-weight:900;
}
.reset{
  width:56px;height:56px;border:1px solid var(--line);border-radius:18px;
  background:#fff;font-size:22px;
}
.toast{
  position:fixed;top:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.86);color:#fff;
  border-radius:999px;padding:10px 16px;
  font-size:13px;font-weight:800;
  opacity:0;pointer-events:none;transition:.2s;z-index:99;
}
.toast.on{opacity:1}
</style>
</head>
<body>
  <section class="splash">
    <div class="logo-icon">🐟</div>
    <div class="gold-title">CHOI WOO YOUNG</div>
    <div class="gold-sub">SEAFOOD CEO</div>
    <div class="divider"></div>
    <div class="app-title">발주리스트</div>
  </section>

  <header class="header">
    <div>
      <div class="h-title">최우영씨푸드 CEO</div>
      <div class="h-sub">Premium Seafood Order System</div>
    </div>
    <div class="today" id="today">TODAY</div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-ic">📦</div>
      <div>
        <div class="hero-title">오늘 발주 품목을 체크해주세요.</div>
        <div class="badges">
          <span class="badge">매장 선택</span>
          <span class="badge gold">보내주세요 자동 포함</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-h">🏪 매장별 선택 <span class="count">6</span></div>
      <div class="store-grid" id="stores"></div>
    </section>

    <section class="card">
      <div class="card-h">🐟 품목 선택 <span class="count">KG</span></div>
      <div id="fishItems"></div>
    </section>

    <section class="card">
      <div class="card-h">📦 해산물 / 기타 <span class="count">EA / BOX</span></div>
      <div id="etcItems"></div>
    </section>

    <section class="card">
      <div class="card-h">☑ 체크 사항</div>
      <div class="check-list">
        <label class="check-row"><input type="checkbox" data-check="서더리와 도미머리"> 서더리와 도미머리</label>
        <label class="check-row"><input type="checkbox" data-check="서더리와 도미머리 손질해서 주세요."> 서더리와 도미머리 손질해서 주세요.</label>
      </div>
    </section>

    <section class="card">
      <div class="card-h">📝 메모란</div>
      <div class="memo-area">
        <textarea id="memo" class="memo" placeholder="추가 요청사항 및 메모를 입력해주세요."></textarea>
      </div>
    </section>

    <section class="card">
      <div class="card-h">📋 전송 미리보기</div>
      <div class="memo-area">
        <div id="preview" class="preview"></div>
      </div>
    </section>
  </main>

  <div class="bottom">
    <div class="bottom-inner">
      <button class="send" onclick="shareText()">📩 보내주세요.</button>
      <button class="copy" onclick="copyText()">복사</button>
      <button class="reset" onclick="resetAll()">↺</button>
    </div>
  </div>

  <div class="toast" id="toast">복사되었습니다.</div>

<script>
const stores = ['구로', '영등포', '여의도', '종로', '메모1', '메모2'];
const fishItems = ['광어','도다리','메모','방어','연어','우럭','점성어','참돔'];
const etcItems = [
  {name:'멍게', unit:'EA'},
  {name:'성게알', unit:'BOX'},
  {name:'전복', unit:'EA'},
  {name:'포장용 매운탕', unit:'EA'}
];

let selectedStore = '';

function $(id){ return document.getElementById(id); }

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 1600);
}

function renderToday(){
  const d = new Date();
  $('today').textContent = `${d.getMonth()+1}/${d.getDate()}`;
}

function renderStores(){
  $('stores').innerHTML = stores.map(s => `<button class="store-btn" data-store="${s}" onclick="selectStore('${s}')">${s}</button>`).join('');
}

function selectStore(s){
  selectedStore = s;
  document.querySelectorAll('.store-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.store === s);
  });
  updatePreview();
}

function renderQtyRow(item, unit, group){
  return `
    <div class="row">
      <div class="item-name">🐠 ${item}</div>
      <div class="qty-wrap">
        <button class="step minus" onclick="stepQty('${group}_${item}', -1)">−</button>
        <input class="qty" id="${group}_${item}" type="number" min="0" placeholder="0" oninput="updatePreview()">
        <button class="step plus" onclick="stepQty('${group}_${item}', 1)">+</button>
        <span class="unit">${unit}</span>
      </div>
    </div>
  `;
}

function renderItems(){
  $('fishItems').innerHTML = fishItems.map(i => renderQtyRow(i, 'kg', 'fish')).join('');
  $('etcItems').innerHTML = etcItems.map(i => renderQtyRow(i.name, i.unit, 'etc')).join('');
}

function stepQty(id, delta){
  const input = $(id);
  const v = Number(input.value || 0);
  input.value = Math.max(0, v + delta);
  updatePreview();
}

function buildMessage(){
  const lines = [];
  lines.push('✨ CHOI WOO YOUNG SEAFOOD CEO ✨');
  lines.push('발주리스트');
  lines.push('');
  lines.push(`🏪 매장: ${selectedStore || '미선택'}`);
  lines.push('');

  const fishSelected = fishItems
    .map(i => ({name:i, qty:$(\`fish_\${i}\`)?.value || ''}))
    .filter(x => x.qty && Number(x.qty) > 0);

  if(fishSelected.length){
    lines.push('🐟 품목 선택');
    fishSelected.forEach(x => lines.push(`- ${x.name} ${x.qty}kg`));
    lines.push('');
  }

  const etcSelected = etcItems
    .map(i => ({name:i.name, unit:i.unit, qty:$(\`etc_\${i.name}\`)?.value || ''}))
    .filter(x => x.qty && Number(x.qty) > 0);

  if(etcSelected.length){
    lines.push('📦 해산물 / 기타');
    etcSelected.forEach(x => lines.push(`- ${x.name} ${x.qty}${x.unit}`));
    lines.push('');
  }

  const checks = Array.from(document.querySelectorAll('[data-check]:checked')).map(c => c.dataset.check);
  if(checks.length){
    lines.push('☑ 체크 사항');
    checks.forEach(c => lines.push(`- ${c}`));
    lines.push('');
  }

  const memo = $('memo').value.trim();
  if(memo){
    lines.push('📝 메모');
    lines.push(memo);
    lines.push('');
  }

  lines.push('보내주세요.');
  return lines.join('\n');
}

function updatePreview(){
  $('preview').textContent = buildMessage();
}

async function copyText(){
  const text = buildMessage();
  try{
    await navigator.clipboard.writeText(text);
    showToast('복사되었습니다.');
  }catch(e){
    const temp = document.createElement('textarea');
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    showToast('복사되었습니다.');
  }
}

async function shareText(){
  const text = buildMessage();
  if(navigator.share){
    try{
      await navigator.share({text});
    }catch(e){}
  }else{
    copyText();
  }
}

function resetAll(){
  selectedStore = '';
  document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
  document.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
  $('memo').value = '';
  updatePreview();
  showToast('초기화되었습니다.');
}

document.addEventListener('change', updatePreview);
renderToday();
renderStores();
renderItems();
updatePreview();
</script>
</body>
</html>
